<!DOCTYPE html>
<html>
<head>
    <title>User & Product Details Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .container {
            display: flex;
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
            flex-wrap: wrap;
        }

        .section {
            flex: 1;
            min-width: 300px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .section:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #667eea;
            font-size: 1.8em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 15px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px 15px;
            margin-top: 8px;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .submit-btn {
            margin-top: 30px;
            padding: 14px;
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                gap: 15px;
            }

            h1 {
                font-size: 2em;
            }

            h2 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>

<h1 style="text-align:center;">User & Product Information</h1>

<form id="verifyForm">
<div class="container">

    <!-- User Section -->
    <div class="section">
        <h2>User Details</h2>

        <label>Name</label>
        <input type="text" name="name" placeholder="Enter your Sweet name" required>

        <label>Mobile Number</label>
        <input type="tel" name="mobile" placeholder="Enter Your 10 Digit Mobile Number" required>

        <label>Email ID</label>
        <input type="email" name="email" placeholder="Enter Your email" required>

        <label>Address</label>
        <textarea name="address" placeholder="Enter address" required></textarea>

        <label>Mode of Payment</label>
        <select name="payment" required>
            <option>COD</option>
            <option>UPI</option>
            <option>Credit Card</option>
            <option>Debit Card</option>
            <option>Net Banking</option>
        </select>
    </div>

    <!-- Product Section -->
    <div class="section">
        <h2>Product Details</h2>

        <label>Product ID</label>
        <input type="text" name="productId" placeholder="Enter product ID" required>

        <label>Price</label>
        <input type="number" name="price" placeholder="Enter Price" required>

        <label>Dealer Name</label>
        <input type="text" name="dealer" placeholder="Enter Dealer Name" required>

        <label>Dealer Address</label>
        <textarea name="dealerAddress" placeholder="Enter Dealer Shop Address" required></textarea>

        <label>Date of Payment</label>
        <input type="date" name="date" required>
    </div>

</div>

<button type="submit" class="submit-btn">Generate QR Code</button>
</form>

<script>
    document.getElementById('verifyForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const formData = new FormData(this);
        const params = new URLSearchParams();
        
        for (let [key, value] of formData.entries()) {
            params.append(key, value);
        }
        
        window.location.href = 'qr.html?' + params.toString();
    });
</script>

</body>
</html>
