<!DOCTYPE html>
<html>
<head>
    <title>QR Code Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }

        .qr-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.2);
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            color: #667eea;
            margin-bottom: 30px;
            font-size: 2em;
            text-align: center;
        }

        .qr-wrapper {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        #qrcode {
            display: inline-block;
        }

        #qrcode canvas {
            border: 3px solid #667eea;
            border-radius: 8px;
            max-width: 100%;
            height: auto;
        }

        .details-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .details-group {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .details-group h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .detail-item {
            margin: 10px 0;
            font-size: 14px;
        }

        .detail-item strong {
            color: #333;
            display: block;
            margin-bottom: 3px;
        }

        .detail-item span {
            color: #666;
            word-break: break-word;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-download {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-back {
            background: #e0e0e0;
            color: #333;
        }

        .btn-back:hover {
            background: #d0d0d0;
        }

        .error {
            color: #d32f2f;
            text-align: center;
            padding: 20px;
            background: #ffebee;
            border-radius: 8px;
        }

        @media (max-width: 600px) {
            .qr-container {
                padding: 25px;
            }

            .details-section {
                grid-template-columns: 1fr;
            }

            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
</head>
<body>

<div class="qr-container">
    <h1>✓ Product QR Code Generated</h1>
    
    <div class="qr-wrapper">
        <div id="qrcode"></div>
    </div>

    <div class="details-section">
        <div class="details-group">
            <h3>👤 User Details</h3>
            <div id="userDetails"></div>
        </div>
        
        <div class="details-group">
            <h3>📦 Product Details</h3>
            <div id="productDetails"></div>
        </div>
    </div>

    <div class="action-buttons">
        <button class="btn-download" onclick="downloadQRCode()">⬇️ Download QR Code</button>
        <button class="btn-back" onclick="goBack()">← Go Back</button>
    </div>
</div>

<script>
    // Get data from URL parameters with proper decoding
    const params = new URLSearchParams(window.location.search);
    
    // Helper function to safely decode and sanitize parameters
    function getParam(key) {
        const value = params.get(key);
        return value ? decodeURIComponent(value).replace(/[<>"'&]/g, '') : 'N/A';
    }
    
    const userData = {
        name: getParam('name'),
        mobile: getParam('mobile'),
        email: getParam('email'),
        address: getParam('address'),
        payment: getParam('payment')
    };

    const productData = {
        productId: getParam('productId'),
        price: getParam('price'),
        dealer: getParam('dealer'),
        dealerAddress: getParam('dealerAddress'),
        date: getParam('date')
    };

    // Create QR code data string (formatted for easy reading)
    const qrData = `USER:${userData.name}|MOBILE:${userData.mobile}|EMAIL:${userData.email}|PRODUCT:${productData.productId}|PRICE:${productData.price}|DEALER:${productData.dealer}|DATE:${productData.date}`;

    // Generate QR code with better error handling
    function generateQRCode() {
        const qrElement = document.getElementById("qrcode");
        if (!qrElement) {
            console.error('QR code container not found');
            return;
        }

        try {
            QRCode.toCanvas(qrElement, qrData, {
                width: 300,
                margin: 2,
                color: {
                    dark: '#000000',
                    light: '#FFFFFF'
                },
                errorCorrectionLevel: 'H'
            }, function (error) {
                if (error) {
                    console.error('QR Code Error:', error);
                    qrElement.innerHTML = '<div class="error">Error generating QR code. Please refresh and try again.</div>';
                }
            });
        } catch (error) {
            console.error('QR Code Exception:', error);
            qrElement.innerHTML = '<div class="error">QR Code library not loaded properly. Please refresh the page.</div>';
        }
    }

    // Wait for DOM and QRCode library to be ready
    if (typeof QRCode !== 'undefined') {
        generateQRCode();
    } else {
        window.addEventListener('load', generateQRCode);
    }

    // Helper function to create detail items safely
    function createDetailItem(label, value) {
        const div = document.createElement('div');
        div.className = 'detail-item';
        
        const strong = document.createElement('strong');
        strong.textContent = label + ':';
        
        const span = document.createElement('span');
        span.textContent = value;
        
        div.appendChild(strong);
        div.appendChild(span);
        return div;
    }

    // Display user details safely
    const userDetailsContainer = document.getElementById('userDetails');
    if (userDetailsContainer) {
        userDetailsContainer.appendChild(createDetailItem('Name', userData.name));
        userDetailsContainer.appendChild(createDetailItem('Mobile', userData.mobile));
        userDetailsContainer.appendChild(createDetailItem('Email', userData.email));
        userDetailsContainer.appendChild(createDetailItem('Address', userData.address));
        userDetailsContainer.appendChild(createDetailItem('Payment Mode', userData.payment));
    }

    // Display product details safely
    const productDetailsContainer = document.getElementById('productDetails');
    if (productDetailsContainer) {
        productDetailsContainer.appendChild(createDetailItem('Product ID', productData.productId));
        productDetailsContainer.appendChild(createDetailItem('Price', '₹' + productData.price));
        productDetailsContainer.appendChild(createDetailItem('Dealer Name', productData.dealer));
        productDetailsContainer.appendChild(createDetailItem('Dealer Address', productData.dealerAddress));
        productDetailsContainer.appendChild(createDetailItem('Date', productData.date));
    }

    // Download QR Code as Image with better error handling
    function downloadQRCode() {
        const canvas = document.querySelector('#qrcode canvas');
        if (!canvas) {
            alert('QR Code not generated yet. Please refresh the page.');
            return;
        }
        
        try {
            const link = document.createElement('a');
            link.href = canvas.toDataURL('image/png');
            const sanitizedProductId = productData.productId.replace(/[^a-zA-Z0-9]/g, '_');
            link.download = `QR_Code_${sanitizedProductId}_${new Date().getTime()}.png`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        } catch (error) {
            console.error('Download error:', error);
            alert('Error downloading QR code. Please try again.');
        }
    }

    // Go back to form
    function goBack() {
        window.location.href = 'verify.html';
    }
</script>

</body>
</html>
